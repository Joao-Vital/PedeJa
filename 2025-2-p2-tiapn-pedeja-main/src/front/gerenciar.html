<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Gerenciamento de Inscrições</title>

    <link rel="stylesheet" href="css/gerenciamentoProdutos.css" />
</head>

<body>

    <!-- ================= HEADER ================= -->
    <header>
        <div id="logo-header">
            <a href="index.html"><img src="images/logo-removebg-preview.png" alt="Logo da Empresa"></a>
        </div>
        <div id="navigation-menu-header">
            <nav>
                <ul>
                    <li><a href="Navegacao.html">Cardápio</a></li>
                    <li><a href="Oficina.html">Oficinas</a></li>
                    <li><a href="Sobre.html">Sobre</a></li>
                </ul>
            </nav>
        </div>
    </header>
    <!-- ============================================ -->

    <section id="top-admin">
        <h1>Gerenciamento de Inscrições</h1>
    </section>

    <main>
        <div class="container">
            <div class="actions">
                <input id="searchInput" type="text" placeholder="Buscar por nome..." />

                <select id="orderSelect">
                    <option value="az">Ordenar A-Z</option>
                    <option value="za">Ordenar Z-A</option>
                </select>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Email</th>
                        <th>Telefone</th>
                        <th>Oficina</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="listaInscricoes"></tbody>
            </table>
        </div>
    </main>

    <script>
        let inscricoes = JSON.parse(localStorage.getItem("inscricoes")) || [];

        function render() {
            let tabela = document.getElementById("listaInscricoes");
            tabela.innerHTML = "";

            let lista = [...inscricoes];

            let search = document.getElementById("searchInput").value.toLowerCase();
            lista = lista.filter(i => i.nome.toLowerCase().includes(search));

            let ordem = document.getElementById("orderSelect").value;
            if (ordem === "az") lista.sort((a, b) => a.nome.localeCompare(b.nome));
            if (ordem === "za") lista.sort((a, b) => b.nome.localeCompare(a.nome));

            lista.forEach(i => {
                tabela.innerHTML += `
                <tr>
                    <td>${i.nome}</td>
                    <td>${i.email}</td>
                    <td>${i.telefone}</td>
                    <td>${i.oficina}</td>
                    <td><button onclick="remover(${i.id})">Excluir</button></td>
                </tr>
                `;
            });
        }

        function remover(id) {
            if (confirm("Deseja realmente excluir esta inscrição?")) {
                inscricoes = inscricoes.filter(i => i.id !== id);
                localStorage.setItem("inscricoes", JSON.stringify(inscricoes));
                render();
            }
        }

        document.getElementById("searchInput").addEventListener("input", render);
        document.getElementById("orderSelect").addEventListener("change", render);

        render();
    </script>


    <!-- ================= FOOTER ================= -->
    <footer>
        <div id="content-footer">
            <div id="logo-footer">
                <img src="./images/logo-removebg-preview.png" alt="Logo">
            </div>
            <div id="menu-footer">
                <h4 class="title">Menu</h4>
                <ul>
                    <li>
                        <a href="Navegacao.html">Cardápio</a>
                    </li>
                    <li>
                        <a href="Oficina.html">Oficinas</a>
                    </li>
                    <li>
                        <a href="Sobre.html">Sobre Nós</a>
                    </li>
                </ul>
            </div>
            <div id="contato-footer">
                <h4 class="title">Contato</h4>
                <p id="email-footer">exemple@gmail.com</p>
                <p id="numero-footer">31 9 0000-0000</p>
                <p id="localizacao-footer">rua do n sei q la</p>
            </div>
        </div>
        <hr id="footer-line">
        <div id="rights-reserved">
            <p>Copyright Dotcreativemarket</p>
            <p>Termos de uso</p>
            <p>Política de privacidade</p>
        </div>
    </footer>

</body>
</html>
