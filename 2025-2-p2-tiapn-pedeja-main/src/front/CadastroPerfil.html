<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Cadastro de Perfil - PedeJá</title>
  <link rel="stylesheet" href="./css/CadastroPerfil.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" />
</head>
<body>
  <header>
    <div id="logo-header">
      <a href="index.html"><img src="./images/logo-removebg-preview.png" alt="PedeJá"></a>
    </div>
    <div id="navigation-menu-header">
      <nav>
        <ul>
          <li><a href="Navegacao.html">Cardápio</a></li>
          <li><a href="Oficina.html">Oficinas</a></li>
          <li><a href="Sobre.html">Sobre</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="conteudo">
    <div class="cartao">
      <section class="formulario">
        <img class="logo-topo" src="./images/logo-removebg-preview.png" alt="PedeJá" />
        <h1>Cadastro de Perfil</h1>

        <form class="formulario-campos" action="#" method="post" autocomplete="off">
          <div class="linha-dupla">
            <label class="campo">
              <span class="sr-only">Primeiro Nome</span>
              <div class="entrada">
                <i class="bi bi-person-fill icone-entrada"></i>
                <input type="text" name="primeiro-nome" placeholder="Primeiro Nome" required />
              </div>
            </label>

            <label class="campo">
              <span class="sr-only">Sobrenome</span>
              <div class="entrada">
                <i class="bi bi-person icone-entrada"></i>
                <input type="text" name="sobrenome" placeholder="Segundo Nome" required />
              </div>
            </label>
          </div>

          <div class="linha linha-dupla">
            <label class="campo">
              <span class="sr-only">CPF</span>
              <div class="entrada">
                <i class="bi bi-credit-card-2-front icone-entrada"></i>
                <input type="text" name="cpf" placeholder="CPF" required />
              </div>
            </label>

            <label class="campo">
              <span class="sr-only">CEP</span>
              <div class="entrada">
                <i class="bi bi-house icone-entrada"></i>
                <input type="text" name="cep" placeholder="CEP" required />
              </div>
            </label>
          </div>

          <div class="linha linha-tripla">
            <label class="campo campo-largo">
              <div class="entrada">
                <i class="bi bi-geo-alt icone-entrada"></i>
                <input type="text" name="endereco" placeholder="Endereço" required />
              </div>
            </label>

            <label class="campo campo-pequeno">
              <div class="entrada">
                <input type="text" name="numero" placeholder="Número" required />
              </div>
            </label>

            <label class="campo campo-pequeno">
              <div class="entrada">
                <input type="text" name="complemento" placeholder="Complemento" />
              </div>
            </label>
          </div>

          <div class="acoes">
            <button class="btn-salvar" type="submit">Salvar Perfil</button>
          </div>
        </form>
      </section>

      <aside class="lateral" aria-hidden="true">
        <div class="conteudo-lateral">
          <div class="avatar" role="img" aria-label="Avatar"></div>

          <div class="lista-contatos">
            <label class="linha-contato">
              <i class="bi bi-telephone-fill"></i>
              <input type="tel" name="telefone" placeholder="Telefone" />
            </label>

            <label class="linha-contato">
              <i class="bi bi-instagram"></i>
              <input type="text" name="instagram" placeholder="Instagram" />
            </label>

            <label class="linha-contato">
              <i class="bi bi-facebook"></i>
              <input type="text" name="facebook" placeholder="Facebook" />
            </label>
          </div>
        </div>
      </aside>
    </div>
  </main>

</body>
<script src="./scripts/CadastroPerfil.js"></script>
</html>
