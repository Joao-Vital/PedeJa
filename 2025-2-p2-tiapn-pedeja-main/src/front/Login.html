<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Entrar - PedeJá</title>
  <link rel="stylesheet" href="./css/Login.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body>
  <main class="wrap">
    <div class="card">
      <section class="form-side">
        <a href="index.html"><img class="logo-top" src="./images/logo-removebg-preview.png" alt="PedeJá logo"></a>
        <h1>Entrar</h1>

        <form class="form" action="#" method="post" autocomplete="off" data-form-login novalidate>
          <label class="field">
            <span class="label-text">Email</span>
            <div class="input-wrap">
              <i class="bi bi-person-fill input-icon"></i>
              <input type="text" name="email" placeholder="Email" required>
            </div>
          </label>

          <label class="field">
            <span class="label-text">Senha</span>
            <div class="input-wrap">
              <i class="bi bi-lock-fill input-icon"></i>
              <input type="password" name="senha" placeholder="Senha" required>
            </div>
          </label>

          <div class="form-row">
            <label class="remember">
              <input type="checkbox" name="lembrar"> Lembrar-me
            </label>
            <a class="forgot" href="#">Esqueci minha senha</a>
          </div>

          <div id="login-feedback" role="alert" aria-live="assertive" hidden></div>

          <p class="small">Ainda não tem conta? <a href="Cadastro.html">Cadastrar-se</a></p>

          <button class="btn-submit" type="submit">Entrar</button>
        </form>
      </section>

      <aside class="visual-side" aria-hidden="true">
        <div class="visual-content">
          <div class="visual-text">
            <h2>Bem-vindo de volta</h2>
            <p>Faça login para continuar pedindo nos melhores estabelecimentos. Ofertas personalizadas e entregas rápidas aguardam por você.</p>
          </div>
        </div>
      </aside>
    </div>
  </main>
  <script src="./scripts/Login.js" type="module" defer></script>
</body>
</html>
