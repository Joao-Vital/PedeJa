<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Cadastro - PedeJá</title>
  <link rel="stylesheet" href="./css/Cadastro.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body>
  <main class="wrap">
    <div class="card">
      <section class="form-side">
        <a href="index.html"><img class="logo-top" src="./images/logo-removebg-preview.png" alt="PedeJá logo"></a>
        <h1>Cadastrar-se</h1>

        <form class="form" action="#" method="post" autocomplete="off" data-form-cadastro novalidate>
          <label class="field">
            <span class="label-text">Email</span>
            <div class="input-wrap">
              <i class="bi bi-envelope-fill input-icon"></i>
              <input type="email" name="email" placeholder="email@exemplo.com" required>
            </div>
          </label>

          <label class="field">
            <span class="label-text">Senha</span>
            <div class="input-wrap">
              <i class="bi bi-lock-fill input-icon"></i>
              <input type="password" name="senha" placeholder="Senha" required minlength="6">
            </div>
          </label>

          <label class="field">
            <span class="label-text">Confirmar Senha</span>
            <div class="input-wrap">
              <i class="bi bi-lock-fill input-icon"></i>
              <input type="password" name="confirmarSenha" placeholder="Repita a senha" required>
            </div>
          </label>

          <p class="small">Você poderá completar seu perfil depois de criar o usuário.</p>

          <div id="form-feedback" role="alert" aria-live="assertive" hidden></div>

          <p class="small">Já possui conta? <a href="Login.html">Entrar</a></p>

          <button class="btn-submit" type="submit">Cadastrar</button>
        </form>
      </section>

      <aside class="visual-side" aria-hidden="true">
        <div class="visual-content">
          <div class="visual-text">
            <h2>Bem-vindo ao PedeJá</h2>
            <p>Cadastre-se e aproveite descontos exclusivos, entregas rápidas e promoções diárias.</p>
          </div>
        </div>
      </aside>
    </div>
  </main>
  <script src="./scripts/Cadastro.js" type="module" defer></script>
</body>
</html>
