    <script>
        // Verificar se o usuário é administrador
        (function checkAdminAccess() {
            const tipoUsuario = localStorage.getItem('pedeja_tipo_usuario') || sessionStorage.getItem('pedeja_tipo_usuario');
            const adminDropdown = document.getElementById('admin-dropdown');
            
            if (adminDropdown && tipoUsuario && (tipoUsuario === 'administrador' || tipoUsuario === 'admin')) {
                adminDropdown.style.display = 'inline-block';
            }
        })();
    </script>
